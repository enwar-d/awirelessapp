ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20.16.0
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.enward.assurancewireless
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build iOS
        script: |
          eas build --platform ios --profile preview --non-interactive --local
    artifacts:
      - "**/*.ipa"
    publishing:
      email:
        recipients:
          - enwar.d@outlook.com
        notify:
          success: true
          failure: true
